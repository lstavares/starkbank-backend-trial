services:
  postgres:
    image: postgres:16-alpine
    container_name: starkbank-trial-postgres
    environment:
      POSTGRES_DB: starkbank_trial
      POSTGRES_USER: starkbank
      POSTGRES_PASSWORD: starkbank
    ports:
      - "5432:5432"
    volumes:
      - starkbank_trial_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starkbank -d starkbank_trial"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  starkbank_trial_pgdata:
    name: starkbank_trial_pgdata
