name: Scale AWS

on:
  workflow_dispatch:
    inputs:
      desired_count:
        description: "ECS desired count. Use 0 to stop tasks; use 1 to receive webhooks and run the scheduler."
        required: true
        type: choice
        options:
          - "0"
          - "1"

permissions:
  contents: read
  id-token: write

jobs:
  scale:
    name: Scale ECS service
    runs-on: ubuntu-latest

    steps:
      - name: Validate desired count
        run: |
          case "${{ inputs.desired_count }}" in
            0|1) exit 0 ;;
            *) echo "desired_count must be 0 or 1" >&2; exit 1 ;;
          esac

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update ECS desired count
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --desired-count "${{ inputs.desired_count }}"
