server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

starkbank:
  environment: ${STARKBANK_ENVIRONMENT:sandbox}
  project-id: ${STARKBANK_PROJECT_ID}
  private-key-path: ${STARKBANK_PRIVATE_KEY_PATH:}
  private-key: ${STARKBANK_PRIVATE_KEY}

invoice:
  scheduler:
    enabled: ${INVOICE_SCHEDULER_ENABLED:false}
    interval-hours: ${INVOICE_INTERVAL_HOURS:3}
    max-batches: ${INVOICE_MAX_BATCHES:8}
